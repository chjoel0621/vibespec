name: Deploy demo (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "plugins/vibespec/skills/vibespec/src/**"
      - "plugins/vibespec/skills/vibespec/build.mjs"
      - "plugins/vibespec/skills/vibespec/assets/viewer.html"
      - "plugins/vibespec/skills/vibespec/scripts/**"
      - "demo/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build viewer from src
        run: node build.mjs
        working-directory: plugins/vibespec/skills/vibespec
      - name: Validate English demo SOT
        run: node plugins/vibespec/skills/vibespec/scripts/validate-sot.mjs demo/meeting-room-booking.en.sot.json
      - name: Stage site
        run: |
          mkdir -p _site/en
          cp plugins/vibespec/skills/vibespec/assets/viewer.html _site/index.html
          node plugins/vibespec/skills/vibespec/scripts/embed-sot.mjs \
            plugins/vibespec/skills/vibespec/assets/viewer.html \
            demo/meeting-room-booking.en.sot.json \
            _site/en/index.html
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
