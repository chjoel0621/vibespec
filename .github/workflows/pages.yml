name: Deploy demo (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "plugins/vibespec/skills/vibespec/src/**"
      - "plugins/vibespec/skills/vibespec/build.mjs"
      - "plugins/vibespec/skills/vibespec/assets/viewer.html"
      - "plugins/vibespec/skills/vibespec/scripts/**"
      - "demo/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Build viewer from src
        run: node build.mjs
        working-directory: plugins/vibespec/skills/vibespec
      # Two demo products, each: main + an approved initiative, in ko and en.
      # <prefix> <init-infix> per product; both languages validate independently
      # (same folder mixes ko/en, so pass explicit file lists, not the folder).
      - name: Validate demo SOTs and trees
        run: |
          S=plugins/vibespec/skills/vibespec
          validate_product() { # $1=demo/<prefix>  $2=<path>.<slug>
            for f in $1.ko.sot.json $1.en.sot.json $1.ko.$2.sot.json $1.en.$2.sot.json; do
              node $S/scripts/validate-sot.mjs "$f"
            done
            node $S/scripts/validate-tree.mjs $1.ko.sot.json $1.ko.$2.sot.json
            node $S/scripts/validate-tree.mjs $1.en.sot.json $1.en.$2.sot.json
          }
          validate_product demo/meeting-room-booking 1-2.notif
          validate_product demo/flea-market 1-1.escrow
          node $S/scripts/validate-sot.mjs demo/crm.ko.sot.json
          node $S/scripts/validate-sot.mjs demo/crm.en.sot.json
          # Flea is the workspace demo: it also carries a proposed increment (offer).
          node $S/scripts/validate-sot.mjs demo/flea-market.ko.1-2.offer.sot.json
          node $S/scripts/validate-sot.mjs demo/flea-market.en.1-2.offer.sot.json
          node $S/scripts/validate-tree.mjs demo/flea-market.ko.sot.json demo/flea-market.ko.1-1.escrow.sot.json demo/flea-market.ko.1-2.offer.sot.json
          node $S/scripts/validate-tree.mjs demo/flea-market.en.sot.json demo/flea-market.en.1-1.escrow.sot.json demo/flea-market.en.1-2.offer.sot.json
      - name: Stage site
        run: |
          S=plugins/vibespec/skills/vibespec
          # Stage one product's 6 pages (main·initiative·map × ko·en). The map is
          # built WITHOUT --link, so it embeds each scope's document: clicking a map
          # node opens that plan read-only, in the same file, with a back link —
          # exactly the self-contained map a real user gets. Demos embed their SOT
          # explicitly so none depends on localStorage (shared per-origin site-wide).
          stage_product() { # $1=demo/<prefix>  $2=url-sub("" or "flea")  $3=<path>.<slug>  $4=<slug>
            local pre=$1 sub=$2 infix=$3 slug=$4
            local dir=_site${sub:+/$sub}
            mkdir -p "$dir/en" "$dir/map" "$dir/en/map" "$dir/$slug" "$dir/en/$slug"
            node $S/scripts/embed-sot.mjs $S/assets/viewer.html $pre.ko.sot.json "$dir/index.html"
            node $S/scripts/embed-sot.mjs $S/assets/viewer.html $pre.en.sot.json "$dir/en/index.html"
            node $S/scripts/embed-sot.mjs $S/assets/viewer.html $pre.ko.$infix.sot.json "$dir/$slug/index.html"
            node $S/scripts/embed-sot.mjs $S/assets/viewer.html $pre.en.$infix.sot.json "$dir/en/$slug/index.html"
            node $S/scripts/product-map.mjs $pre.ko.sot.json $pre.ko.$infix.sot.json --html "$dir/map/index.html"
            node $S/scripts/product-map.mjs $pre.en.sot.json $pre.en.$infix.sot.json --html "$dir/en/map/index.html"
          }
          stage_product demo/meeting-room-booking "" 1-2.notif notif
          mkdir -p _site/crm/en
          node $S/scripts/embed-sot.mjs $S/assets/viewer.html demo/crm.ko.sot.json _site/crm/index.html
          node $S/scripts/embed-sot.mjs $S/assets/viewer.html demo/crm.en.sot.json _site/crm/en/index.html
          # Flea is the workspace demo: escrow (approved) + offer (proposed). The
          # release map excludes the proposed offer; the workspace map includes it,
          # so the two pages show the difference side by side. Same inputs, two modes.
          F=demo/flea-market
          mkdir -p _site/flea/en _site/flea/map _site/flea/en/map _site/flea/escrow _site/flea/en/escrow _site/flea/workspace _site/flea/en/workspace
          node $S/scripts/embed-sot.mjs $S/assets/viewer.html $F.ko.sot.json _site/flea/index.html
          node $S/scripts/embed-sot.mjs $S/assets/viewer.html $F.en.sot.json _site/flea/en/index.html
          node $S/scripts/embed-sot.mjs $S/assets/viewer.html $F.ko.1-1.escrow.sot.json _site/flea/escrow/index.html
          node $S/scripts/embed-sot.mjs $S/assets/viewer.html $F.en.1-1.escrow.sot.json _site/flea/en/escrow/index.html
          node $S/scripts/product-map.mjs $F.ko.sot.json $F.ko.1-1.escrow.sot.json $F.ko.1-2.offer.sot.json --html _site/flea/map/index.html
          node $S/scripts/product-map.mjs $F.en.sot.json $F.en.1-1.escrow.sot.json $F.en.1-2.offer.sot.json --html _site/flea/en/map/index.html
          node $S/scripts/product-map.mjs $F.ko.sot.json $F.ko.1-1.escrow.sot.json $F.ko.1-2.offer.sot.json --workspace --html _site/flea/workspace/index.html
          node $S/scripts/product-map.mjs $F.en.sot.json $F.en.1-1.escrow.sot.json $F.en.1-2.offer.sot.json --workspace --html _site/flea/en/workspace/index.html
      # Each product's pages are separate documents; without this strip a map is
      # unreachable from its demo and the two products don't cross-link. Demo-only.
      - name: Add demo navigation
        run: node demo/nav.mjs /vibespec _site
      # A silent no-op here would republish a dead-end demo, so fail loudly.
      - name: Verify demo is navigable
        run: |
          verify_product() { # $1=url-sub("" or "flea")  $2=<slug>
            local dir=_site${1:+/$1}
            for f in "" en/ $2/ en/$2/ map/ en/map/; do
              grep -q 'class="demo-nav"' "$dir/${f}index.html" || { echo "no nav strip: $dir/${f}index.html"; exit 1; }
            done
            # The map opens documents from its embedded payload; assert it carries
            # each scope's SOT (browser-map.mjs covers the read-only open + back link).
            grep -q '"sot":{' "$dir/map/index.html" || { echo "ko map ($1) does not embed its documents"; exit 1; }
            grep -q '"sot":{' "$dir/en/map/index.html" || { echo "en map ($1) does not embed its documents"; exit 1; }
          }
          verify_product "" notif
          verify_product flea escrow
          for f in crm/index.html crm/en/index.html; do
            grep -q 'class="demo-nav"' "_site/$f" || { echo "no nav strip: _site/$f"; exit 1; }
          done
          # Flea's extra workspace pages carry the nav strip too.
          for f in flea/workspace/ flea/en/workspace/; do
            grep -q 'class="demo-nav"' "_site/${f}index.html" || { echo "no nav strip: _site/${f}index.html"; exit 1; }
          done
          # The workspace demo's whole point: the proposed increment (offer, unique
          # word "네고"/"negotiation") shows in the workspace map but NOT the release map.
          grep -qF "네고" _site/flea/workspace/index.html || { echo "ko workspace map is missing the proposed increment"; exit 1; }
          grep -qF "negotiation" _site/flea/en/workspace/index.html || { echo "en workspace map is missing the proposed increment"; exit 1; }
          if grep -qF "네고" _site/flea/map/index.html; then echo "ko release map must NOT include the proposed increment"; exit 1; fi
          if grep -qF "negotiation" _site/flea/en/map/index.html; then echo "en release map must NOT include the proposed increment"; exit 1; fi
          # Cross-product link present on both mains.
          grep -q 'demo-nav-alt' _site/index.html || { echo "root demo missing cross-product link"; exit 1; }
          grep -q 'demo-nav-alt' _site/flea/index.html || { echo "flea demo missing cross-product link"; exit 1; }
          echo "[verify] nav on every page; maps embed docs; proposed shows in workspace only; products cross-link"
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
