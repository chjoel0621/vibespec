<!doctype html>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>VibeSpec</title>
<style>
  :root{
    --bg:#ffffff; --panel:#f7f7f8; --line:#e6e6e9; --line2:#eeeef1;
    --text:#1e1e22; --muted:#8a8a94; --sub:#6b6b74;
    --accent:#7c5cff; --accent-soft:#efeaff; --accent-line:#d9cfff;
    --ok:#16a34a; --warn:#e0a400; --chip:#f0f0f3;
    --radius:12px; --shadow:0 1px 2px rgba(20,20,30,.06),0 8px 24px rgba(20,20,30,.06);
    font-synthesis:none;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    font-size:14px; line-height:1.55;
  }
  .app{display:flex;flex-direction:column;height:100vh}
  /* top bar */
  .topbar{display:flex;align-items:center;gap:14px;padding:10px 18px;border-bottom:1px solid var(--line);flex:0 0 auto}
  .logo{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,#7c5cff,#b49bff);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px}
  .title{font-weight:650;font-size:15px}
  .title small{display:block;color:var(--muted);font-weight:500;font-size:12px}
  .tabs{display:flex;gap:4px;margin:0 auto;background:var(--panel);padding:4px;border-radius:10px}
  .tab{border:0;background:transparent;color:var(--sub);padding:7px 16px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer}
  .tab[aria-selected="true"]{background:#fff;color:var(--text);box-shadow:var(--shadow)}
  .topbtn{border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 12px;font-size:12.5px;font-weight:600;color:var(--sub);cursor:pointer}
  .topbtn.primary{background:#151519;color:#fff;border-color:#151519}
  .topbtn.danger{color:#c0392b;border-color:#f0d4d0}
  .topbtn.danger:hover{background:#fdeeec}
  /* body */
  .view{flex:1 1 auto;overflow:auto}
  .wrap{max-width:1120px;margin:0 auto;padding:28px 24px 80px}
  .wrap.tree{max-width:none;padding:0}
  .wrap.spec{max-width:none;padding:16px}
  .wrap.flow{max-width:none;padding:0;display:block}
  .wrap.ia{max-width:none;padding:0}
  /* IA 사이트맵(위→아래 트리) */
  .ia2{display:flex;height:calc(100vh - 92px)}
  .ia-canvas{flex:1 1 auto;overflow:auto;background:#fbfbfd}
  .ia-side{flex:0 0 330px;border-left:1px solid var(--line);overflow:auto;background:#fff}
  .sitemap{padding:28px 30px 50px;min-width:max-content;display:flex;justify-content:center}
  .sitemap ul{display:flex;justify-content:center;position:relative;padding-top:26px;margin:0;list-style:none}
  .sitemap > ul{padding-top:0}
  .sitemap li{position:relative;padding:26px 14px 0;text-align:center}
  .sitemap li::before,.sitemap li::after{content:'';position:absolute;top:0;right:50%;width:50%;height:26px;border-top:1.5px solid var(--accent-line)}
  .sitemap li::after{right:auto;left:50%;border-left:1.5px solid var(--accent-line)}
  .sitemap li::before{border-right:1.5px solid var(--accent-line)}
  .sitemap li:only-child::before,.sitemap li:only-child::after{display:none}
  .sitemap li:only-child{padding-top:0}
  .sitemap li:first-child::before,.sitemap li:last-child::after{border:0}
  .sitemap li:last-child::before{border-right:1.5px solid var(--accent-line);border-radius:0 7px 0 0}
  .sitemap li:first-child::after{border-radius:7px 0 0 0}
  .sitemap ul ul::before{content:'';position:absolute;top:0;left:50%;width:0;height:26px;border-left:1.5px solid var(--accent-line)}
  .snode{position:relative;display:inline-flex;flex-direction:column;align-items:center;gap:3px;border:1.5px solid var(--accent-line);border-radius:10px;padding:10px 16px;background:#fff;cursor:pointer;min-width:92px;box-shadow:var(--shadow)}
  .snode:hover{border-color:var(--accent)}
  .snode.sel{box-shadow:0 0 0 2px var(--accent)}
  .snode.root{background:var(--accent);color:#fff;border-color:var(--accent);cursor:default}
  .snode.sec{background:var(--accent-soft);font-weight:700}
  .snode.top{border-color:var(--accent);font-weight:700}
  .snode.action{border-radius:999px}
  .snode .stitle{font-size:12.5px;font-weight:600;white-space:nowrap}
  .snode .stype{font-size:10px;font-weight:700;letter-spacing:.3px;opacity:.7}
  .snode .srowbtns{position:absolute;top:-11px;right:-9px;display:flex;gap:3px;opacity:0;transition:opacity .15s}
  .snode:hover .srowbtns{opacity:1}
  .srowbtns .mini{width:20px;height:20px;font-size:12px;background:#fff}
  .ia-hint{padding:14px 18px;color:var(--muted);font-size:12px;border-bottom:1px solid var(--line2)}
  .ia-warn{background:#fff8ec;border-bottom:1px solid #f0e2c4;padding:12px 18px}
  .iw-head{display:flex;align-items:center;gap:10px;font-size:12.5px;color:#7a5b00}
  .iw-head b{color:#a76f00}
  .iw-btns{margin-left:auto;display:flex;gap:6px}
  .addbtn.ghost{background:#fff;border-color:#e6d9b6;color:#8a6d1f}
  .iw-list{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
  .warn-chip{background:#fff;border:1px solid #ecdcb4;color:#8a6d1f;border-radius:999px;padding:2px 9px;font-size:11px}
  .warn-chip.more{background:#f4ead0}
  .ia-ok{background:#eefaf0;border-bottom:1px solid #cfeccf;padding:11px 18px;color:#1f7a3a;font-size:12.5px;font-weight:600}
  .ptype{font-size:10.5px;font-weight:700;padding:1px 6px;border-radius:5px;margin-right:2px}
  .ptype.top{background:var(--accent);color:#fff}
  .ptype.page{background:var(--accent-soft);color:var(--accent)}
  .ptype.action{background:#eee;color:var(--sub)}
  .ia-link{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:7px;font-size:12.5px}
  .ia-link:hover{background:var(--panel)}
  .ia-link .ill{flex:1}
  .ia-linkadd{margin-top:8px}
  .ia-linkadd select{width:100%;border:1px solid var(--line);border-radius:7px;padding:6px 8px;font-size:12.5px;background:#fff}
  .fref{margin-left:7px;background:rgba(255,255,255,.35);border-radius:999px;font-size:10px;padding:1px 6px;font-weight:700}
  .fnode.page .fref{background:#fff;color:var(--accent)}
  .fnode.action .fref{background:var(--accent-soft);color:var(--accent)}
  .topbtn:disabled{opacity:.35;cursor:default}
  .hist-drawer{position:fixed;top:0;right:0;width:320px;height:100vh;background:#fff;border-left:1px solid var(--line);box-shadow:-8px 0 24px rgba(20,20,30,.08);transform:translateX(100%);transition:transform .22s;z-index:60;display:flex;flex-direction:column}
  .hist-drawer.open{transform:translateX(0)}
  .hist-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;font-weight:650;font-size:14px;border-bottom:1px solid var(--line)}
  .hist-sub{padding:10px 16px 6px;color:var(--muted);font-size:11.5px}
  .hist-list{overflow:auto;padding:6px 10px 20px;flex:1}
  .hist-item{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:12.5px;border:1px solid transparent}
  .hist-item:hover{background:var(--panel)}
  .hist-item.cur{background:var(--accent-soft);border-color:var(--accent-line)}
  .hist-item .hi-dot{width:8px;height:8px;border-radius:50%;background:var(--accent-line);flex:0 0 auto}
  .hist-item.cur .hi-dot{background:var(--accent)}
  .hist-item .hi-label{flex:1;font-weight:600}
  .hist-item .hi-time{color:var(--muted);font-size:11px}
  .sot-flash{position:fixed;left:50%;transform:translateX(-50%);bottom:24px;background:#151519;color:#fff;padding:9px 16px;border-radius:999px;font-size:12.5px;font-weight:600;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:opacity .25s, transform .25s;z-index:50}
  .sot-flash.show{opacity:1;transform:translateX(-50%) translateY(-2px)}
  .sot-flash b{color:#c7b8ff}

  /* ============ PRD VIEW ============ */
  .prd h1{font-size:26px;margin:0 0 6px;letter-spacing:-.3px}
  .prd .kv{color:var(--muted);font-size:12.5px;margin-bottom:22px}
  .prd section{margin:26px 0}
  .prd h2{font-size:15px;margin:0 0 10px;display:flex;align-items:center;gap:8px}
  .prd h2::before{content:"";width:4px;height:15px;border-radius:2px;background:var(--accent)}
  .field{outline:none;border-radius:6px;padding:2px 4px;margin:-2px -4px;transition:background .15s}
  .field:hover{background:var(--accent-soft)}
  .field:focus{background:#fff;box-shadow:0 0 0 2px var(--accent-line)}
  .goals{margin:0;padding:0;list-style:none}
  .goals li{display:flex;gap:10px;padding:6px 0;border-bottom:1px dashed var(--line2)}
  .goals li::before{content:"◆";color:var(--accent);font-size:10px;margin-top:5px}
  .persona{display:inline-block;background:var(--chip);border-radius:999px;padding:5px 12px;margin:0 6px 6px 0;font-size:12.5px}
  .req-doc{border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;margin:12px 0}
  .req-doc h3{margin:0 0 4px;font-size:15px}
  .req-doc .rd-desc{color:var(--sub);font-size:13px;margin-bottom:12px}
  .prd-doc{max-width:820px}
  .prd-row{display:flex;gap:16px;padding:9px 0;border-bottom:1px solid var(--line2)}
  .prd-k{flex:0 0 108px;color:var(--muted);font-size:12.5px;font-weight:600;padding-top:2px}
  .prd-field{flex:1;font-size:13.5px;line-height:1.6;outline:none;border-radius:6px;padding:2px 6px;margin:-2px 0}
  .prd-field:hover{background:var(--accent-soft)}
  .prd-field:focus{background:#fff;box-shadow:0 0 0 2px var(--accent-line)}
  .prd-sub{font-size:12.5px;color:var(--sub);margin:16px 0 6px;font-weight:650}
  .prd-list{margin:0 0 8px;padding-left:20px}
  .prd-list li{padding:4px 0;display:flex;gap:8px;align-items:flex-start}
  .prd-list li .field{flex:1;outline:none;border-radius:5px;padding:1px 4px}
  .prd-list li .field:hover{background:var(--accent-soft)}
  .prd-list li .field:focus{background:#fff;box-shadow:0 0 0 2px var(--accent-line)}
  .prd-list .ac-del{opacity:0}
  .prd-list li:hover .ac-del{opacity:1}
  .prd-chips{display:flex;flex-wrap:wrap;align-items:center;gap:4px}
  .prd-hint{font-weight:400;color:var(--muted);font-size:11px;margin-left:4px}
  .pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin-bottom:8px}
  .pcard{border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:#fff}
  .pcard-h{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .pc-name{font-weight:700;font-size:13px}
  .pc-role{font-size:11px;color:var(--accent);background:var(--accent-soft);border-radius:999px;padding:1px 8px}
  .pcard-h .mini{margin-left:auto;opacity:0}
  .pcard:hover .mini{opacity:1}
  .pcard-row{display:flex;gap:8px;font-size:12px;padding:2px 0}
  .pcard-row .pc-k{flex:0 0 34px;color:var(--muted);font-weight:600}
  .pcard-row .field{flex:1}
  .scn-list li.scn-row{display:flex;gap:10px;align-items:flex-start}
  .scn-row .scn-text{flex:1}
  .scn-ctl{display:flex;align-items:center;gap:5px;flex:0 0 auto}
  .scn-ctl select{border:1px solid var(--line);border-radius:7px;padding:4px 6px;font-size:11.5px;max-width:150px;background:#fff}
  .scn-go{border:1px solid var(--accent-line);background:var(--accent-soft);color:var(--accent);border-radius:7px;padding:3px 8px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap}
  .scn-row .mini{opacity:0}
  .scn-row:hover .mini{opacity:1}
  .kgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-bottom:8px}
  .kcard{border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:#fff}
  .kcard-h{display:flex;align-items:center;gap:8px;margin-bottom:7px}
  .k-name{font-weight:700;font-size:13px;flex:1}
  .kcard-h .mini{opacity:0}
  .kcard:hover .mini{opacity:1}
  .kcard-grid{display:flex;flex-wrap:wrap;gap:6px 12px;margin-bottom:8px}
  .kcard-grid label{display:flex;flex-direction:column;gap:2px;font-size:10.5px;color:var(--muted);font-weight:600;flex:1 1 30%}
  .kcard-grid label .field{font-size:12.5px;color:var(--text);font-weight:400}
  .kcard-refs{display:flex;flex-wrap:wrap;align-items:center;gap:5px;border-top:1px solid var(--line2);padding-top:7px}
  .kpi-reflabel{font-size:10.5px;color:var(--muted);font-weight:600}
  .kpi-ref{display:inline-flex;align-items:center;gap:3px;background:var(--accent-soft);color:var(--accent);border:1px solid var(--accent-line);border-radius:999px;padding:1px 4px 1px 8px;font-size:11px;font-weight:600}
  .kpi-ref .ac-del{opacity:1;color:var(--accent);font-size:12px}
  .kcard-refs select{border:1px dashed var(--accent-line);border-radius:7px;padding:2px 6px;font-size:11px;color:var(--accent);background:#fff;cursor:pointer}
  .trace-row{display:flex;gap:8px;align-items:flex-start;padding:3px 0;font-size:12px}
  .trace-k{flex:0 0 66px;color:var(--muted);font-weight:600;padding-top:3px}
  .trace-v{flex:1;display:flex;flex-wrap:wrap;gap:5px}
  .trace-chip{border:1px solid var(--accent-line);background:var(--accent-soft);color:var(--accent);border-radius:7px;padding:2px 8px;font-size:11.5px;font-weight:600;cursor:pointer}
  .trace-chip:hover{background:#fff}
  .trace-chip.kpi{border-color:#cfe0d0;background:#eefaf0;color:#1f7a3a}
  .empty-inline{color:var(--muted);font-size:11.5px;font-style:italic;padding-top:3px}
  .prog-bar{display:flex;height:8px;border-radius:999px;overflow:hidden;background:var(--line2);margin:4px 0 6px}
  .prog-bar .pb{display:block;height:100%}
  .prog-bar .pb.done{background:var(--ok)}
  .prog-bar .pb.doing{background:var(--warn)}
  .prog-bar .pb.todo{background:#c7c7cf}
  .prog-legend{font-size:11.5px;color:var(--sub)}
  .prog-legend .pl-dim{color:var(--muted)}
  .chip-del{margin:0 8px 0 -4px;font-size:12px}
  .feat-line{padding:9px 0;border-top:1px solid var(--line2)}
  .feat-line .fl-head{display:flex;align-items:center;gap:8px;font-weight:600}
  .feat-line .specs{color:var(--sub);font-size:12.5px;margin:4px 0 0 2px}
  .prio{font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px}
  .prio.high{background:#fdeaea;color:#c0392b}
  .prio.mid{background:#fff4de;color:#a76f00}
  .prio.low{background:#e9f3ff;color:#2b6cb0}
  .status-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .st-todo{background:#c7c7cf}.st-doing{background:var(--warn)}.st-done{background:var(--ok)}

  /* ============ SPEC TABLE VIEW ============ */
  .spec-note{color:var(--sub);margin-bottom:14px}
  table.spec{width:100%;border-collapse:collapse;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  table.spec th{background:var(--panel);text-align:left;font-size:12px;color:var(--muted);font-weight:650;padding:11px 14px;border-bottom:1px solid var(--line)}
  table.spec td{padding:9px 14px;border-bottom:1px solid var(--line2);vertical-align:top}
  table.spec tr:last-child td{border-bottom:0}
  .col-req{width:20%;font-weight:650}
  .col-feat{width:24%;font-weight:600}
  .col-spec{width:56%}
  .spec-row{display:flex;align-items:center;gap:8px}
  .spec-row .txt{flex:1}
  .rowbtns{display:flex;gap:4px;opacity:0;transition:opacity .15s}
  tr:hover .rowbtns{opacity:1}
  .mini{border:1px solid var(--line);background:#fff;border-radius:6px;width:22px;height:22px;line-height:1;font-size:13px;cursor:pointer;color:var(--sub)}
  .mini:hover{background:var(--accent-soft);border-color:var(--accent-line);color:var(--accent)}
  .addrow td{background:#fcfcfd}
  .addbtn{border:1px dashed var(--accent-line);background:var(--accent-soft);color:var(--accent);border-radius:7px;padding:5px 10px;font-size:12px;font-weight:600;cursor:pointer}

  /* ============ USER FLOW VIEW ============ */
  .flow-note{color:var(--sub);margin-bottom:18px}
  .flow{display:flex;gap:0;overflow-x:auto;padding-bottom:20px}
  .stage{min-width:240px;flex:0 0 auto;position:relative;padding:0 18px}
  .stage:not(:last-child)::after{content:"→";position:absolute;right:-9px;top:26px;color:var(--accent);font-size:20px}
  .stage-head{background:var(--accent);color:#fff;border-radius:8px;padding:8px 12px;font-weight:650;font-size:13px;text-align:center;margin-bottom:14px}
  .node{border:1px solid var(--line);border-radius:10px;padding:11px 12px;margin-bottom:12px;background:#fff;box-shadow:var(--shadow)}
  .node .n-title{font-weight:650;font-size:13px;display:flex;align-items:center;gap:7px}
  .node .n-step{color:var(--muted);font-size:11.5px;margin:4px 0 0}
  .node ul{margin:8px 0 0;padding-left:16px;color:var(--sub);font-size:12px}
  .node ul li{margin:2px 0}

  /* ============ USER FLOW (typed nodes + sections) ============ */
  .flow2{position:relative;padding:64px 48px 48px 156px;min-width:max-content}
  .flow2 .branch{display:flex;flex-direction:row;align-items:center}
  .flow2 .children{display:flex;flex-direction:column;justify-content:center;gap:12px;margin-left:58px}
  .flow-legend{position:absolute;top:18px;right:34px;display:flex;gap:16px;font-size:11.5px;color:var(--sub);align-items:center;z-index:3}
  .flow-legend .lg{display:flex;align-items:center;gap:6px}
  .flow-legend .sw{width:14px;height:14px;border-radius:4px;display:inline-block;border:1px solid var(--line)}
  .sw.start{background:#1e1e22;border-color:#1e1e22}
  .sw.top{background:var(--accent);border-color:var(--accent)}
  .sw.page{background:var(--accent-soft);border-color:var(--accent-line)}
  .sw.action{background:#fff;border-radius:50%}
  .flow-band-sep{position:absolute;left:0;right:0;height:1px;background:var(--line2);z-index:0}
  .flow-band-label{position:absolute;left:22px;font-size:12.5px;color:var(--sub);font-weight:600;z-index:2}
  .fnode{position:relative;z-index:1;display:inline-flex;align-items:center;justify-content:center;padding:10px 18px;border-radius:9px;font-size:12.5px;font-weight:600;white-space:nowrap;box-shadow:var(--shadow);background:#fff;border:1px solid var(--line);margin:6px 0}
  .fnode.start{background:#1e1e22;color:#fff;border-color:#1e1e22}
  .fnode.top{background:var(--accent);color:#fff;border-color:var(--accent)}
  .fnode.page{background:var(--accent-soft);border-color:var(--accent-line)}
  .fnode.action{background:#fff;border-radius:999px}
  .fnode .ftitle{outline:none;border-radius:4px}
  .fnode.top .ftitle:focus,.fnode.page .ftitle:focus,.fnode.action .ftitle:focus{box-shadow:0 0 0 2px var(--accent-line)}
  /* 전환 그래프 */
  .flowwrap{position:relative;width:100%;height:calc(100vh - 92px);display:flex;flex-direction:column}
  .flow-warn{flex:0 0 auto;padding:9px 16px;font-size:12.5px;border-bottom:1px solid #f0e2c4;background:#fff8ec;color:#7a5b00}
  .flow-warn.ok{background:#eefaf0;border-color:#cfeccf;color:#1f7a3a}
  .flow-warn .iw-btns{margin-left:4px}
  .warn-chip{display:inline-block;background:#fff;border:1px solid #ecdcb4;color:#8a6d1f;border-radius:999px;padding:1px 8px;font-size:11px;margin:4px 4px 0 0}
  .flow-stage{position:relative;flex:1 1 auto;min-height:0;display:flex}
  .flow-main{position:relative;flex:1 1 auto;min-width:0}
  .flowg{position:absolute;inset:0;width:100%;overflow:auto;cursor:grab;background:#fbfbfd}
  .flowg-inner{position:relative;transform-origin:0 0}
  .flow-zoom{position:absolute;right:20px;bottom:20px;display:flex;gap:5px;z-index:6}
  .flow-zoom .zbtn{width:34px;height:34px;border:1px solid var(--line);background:#fff;border-radius:8px;font-size:16px;font-weight:600;color:var(--sub);cursor:pointer;box-shadow:var(--shadow)}
  .flow-zoom .zbtn[data-zoom="fit"]{width:auto;padding:0 12px;font-size:12.5px}
  .flow-zoom .zbtn:hover{background:var(--accent-soft);color:var(--accent)}
  .flowg .fnode{position:absolute;margin:0;justify-content:flex-start;overflow:hidden;cursor:pointer}

function normalize(s){
  if(!s.prd) s.prd={};

  if(Array.isArray(s.goals) && s.goals.length && !pd.goal) pd.goal=s.goals.join(" / ");
  if(Array.isArray(s.personas) && s.personas.length && (!Array.isArray(pd.targets)||!pd.targets.length)) pd.targets=s.personas.slice();
  delete s.overview; delete s.goals; delete s.personas;
  s.requirements.forEach(r=>{
    if(r.status==null) r.status="todo";
    if(r.priority==null) r.priority="mid";
    if(r.desc==null) r.desc="";
    if(!r.acceptance) r.acceptance=[];
    r.features.forEach(f=>{ if(f.desc==null) f.desc=""; if(!f.acceptance) f.acceptance=[];
      f.specs = f.specs.map(sp=>{
        if(typeof sp==="string") return {title:sp, desc:"", acceptance:[]};
        if(sp.desc==null) sp.desc=""; if(!sp.acceptance) sp.acceptance=[]; return sp;
      });
    });
  });
  if(pd.background && !pd.whyNow) pd.whyNow=pd.background;
  if(Array.isArray(pd.roles) && pd.roles.length){ if(!Array.isArray(pd.targets)) pd.targets=[]; pd.roles.forEach(r=>{ if(!pd.targets.includes(r)) pd.targets.push(r); }); }
  delete pd.background; delete pd.roles;
  ["oneLiner","goal","whyNow","problem","solution","alternatives","differentiator","northStar","category"].forEach(k=>{ if(pd[k]==null) pd[k]=""; });
  ["targets","scenarios","kpis","inScope","nonGoals","assumptions","risks","openQuestions","constraints","platforms"].forEach(k=>{ if(!Array.isArray(pd[k])) pd[k]=[]; });
  pd.kpis = pd.kpis.map(k=> typeof k==="string" ? {name:k,target:"",baseline:"",method:"",refs:[]} : {name:k.name||"",target:k.target||"",baseline:k.baseline||"",method:k.method||"",refs:Array.isArray(k.refs)?k.refs:[]});
  pd.scenarios = pd.scenarios.map(x=> typeof x==="string" ? {text:x,start:""} : {text:x.text||"",start:x.start||""});
  pd.targets = pd.targets.map(t=> typeof t==="string" ? {name:t,role:"",needs:"",pain:""} : {name:t.name||"",role:t.role||"",needs:t.needs||"",pain:t.pain||""});
  if(!s.title) s.title=pd.oneLiner||"Untitled VibeSpec";
  if(s.lang!=="en") s.lang="ko";
  if(!s.ia) s.ia={sections:[]};
  const fix=arr=>arr.forEach(p=>{ if(!p.type)p.type="page"; if(!p.refs)p.refs=[]; if(!p.children)p.children=[]; fix(p.children); });
  s.ia.sections.forEach(sec=>{ if(!sec.pages)sec.pages=[]; fix(sec.pages); });
  if(s.flow && Array.isArray(s.flow.transitions)){
    s.flow.transitions = s.flow.transitions.map(t=>{
      const o={ from: t.from||t.source||t.fromPage||t.fromId||t.start, to: t.to||t.target||t.toPage||t.toId||t.end };
      if(t.ref) o.ref=t.ref; else { const l=t.label||t.action||t.name||t.trigger||t.title||""; if(l) o.label=l; }
      return o;
    }).filter(t=>t.from&&t.to);
    if(s.flow.start==null) s.flow.start=s.flow.entry||s.flow.from||null;
  }
  if(!s.flow || !Array.isArray(s.flow.transitions) || !s.flow.transitions.length) s.flow=deriveFlow(s);
  return s;
}
function deriveFlow(s){
  const trans=[], tops=[];
  s.ia.sections.forEach(sec=>{ if(sec.pages[0]) tops.push(sec.pages[0].id);
    const walk=p=>{ (p.children||[]).forEach(c=>{ trans.push(flowTransition(p.id,c.id)); walk(c); }); };
    sec.pages.forEach(walk);
  });

let HISTORY=[], HPTR=-1, restoring=false;

function pushHistory(label){
  const snap=snapshot();
  if(HPTR>=0 && HISTORY[HPTR] && HISTORY[HPTR].sot===snap) return; // no change
  HISTORY = HISTORY.slice(0, HPTR+1);
  HISTORY.push({t:Date.now(), label: label || (t(VIEWNAME[VIEW],VIEWNAME_EN[VIEW])+t(" 편집"," edit")), sot:snap});

}

function renderSpec(){
  if(!find(selReq)) selReq = SOT.requirements[0] ? SOT.requirements[0].id : null;
  const req = find(selReq);
  if(req && !req.features.find(f=>f.id===selFeat)) selFeat = req.features[0] ? req.features[0].id : null;
  if(!nodeInfo(selNode)) selNode = selReq;
  const feat = selFeat ? findF(selFeat).f : null;

  // 1) 요구사항
  let colReqHtml;
  if(colReqCol){ colReqHtml = `<div class="dir-col collapsed" data-expand="req" title="${t('펼치기','Expand')}"><div class="cc-label">${t('요구사항','Requirements')} ▸</div></div>`; }
  else{
    const items = SOT.requirements.map(r=>`<div class="dir-item ${r.id===selReq?'sel':''}" data-selreq="${r.id}">
      <span class="di-title">${esc(r.title)}</span><span class="di-meta">${r.features.length}</span></div>`).join("") || `<div class="empty">${t('없음','None')}</div>`;
    colReqHtml = `<div class="dir-col cReq">
      <div class="dir-head">${t('요구사항','Requirements')} <span class="hd-btns"><button class="mini" data-collapse="req" title="${t('접기','Collapse')}">‹</button><button class="addbtn sm" data-add-req>＋</button></span></div>
      <div class="dir-body">${items}</div></div>`;
  }
  // 2) 기능
  let colFeatHtml;
  if(colFeatCol){ colFeatHtml = `<div class="dir-col collapsed" data-expand="feat" title="${t('펼치기','Expand')}"><div class="cc-label">${t('기능','Features')} ▸</div></div>`; }
  else{
    const items = req ? (req.features.map(f=>{
      const s=STAT[f.status];
      return `<div class="dir-item ${f.id===selFeat?'sel':''}" data-selfeat="${f.id}">
        <span class="status-dot ${s.c}"></span><span class="di-title">${esc(f.title)}</span>
        <span class="di-meta">${f.starred?'★ ':''}${f.specs.length}</span></div>`;
    }).join("") || `<div class="empty">${t('기능 없음','No features')}</div>`) : `<div class="empty">${t('요구사항 선택','Select a requirement')}</div>`;
    colFeatHtml = `<div class="dir-col cFeat">
      <div class="dir-head">${t('기능','Features')} <span class="hd-btns"><button class="mini" data-collapse="feat" title="${t('접기','Collapse')}">‹</button><button class="addbtn sm" data-add-feat="${selReq}">＋</button></span></div>
      <div class="dir-body">${items}</div></div>`;
  }
  // 3) 상세 기능
  const specItems = feat ? (feat.specs.map((sp,si)=>{
    const sid = selFeat+":"+si;
    return `<div class="dir-item ${sid===selNode?'sel':''}" data-selnode="${sid}">
      <span class="ds-idx">${si+1}</span><span class="di-title">${esc(specTitle(sp))}</span></div>`;
  }).join("") || `<div class="empty">${t('상세기능 없음','No sub-features')}</div>`) : `<div class="empty">${t('기능 선택','Select a feature')}</div>`;
  const colSpecHtml = `<div class="dir-col cSpec">
    <div class="dir-head">${t('상세 기능','Sub-features')} ${feat?`<button class="addbtn sm" data-add-spec="${selFeat}">＋</button>`:''}</div>
    <div class="dir-body">${specItems}</div></div>`;

  // 4) 상세 패널
  const colDetailHtml = `<div class="dir-col cDetail">${renderDetail()}</div>`;

  return `<div class="dir">${colReqHtml}${colFeatHtml}${colSpecHtml}${colDetailHtml}</div>`;
}


/* ==== 65-detail.js ==== */
function childIds(node){ if(node.kind==="req"){ const ids=[]; node.obj.features.forEach(f=>{ ids.push(f.id); f.specs.forEach((sp,i)=>ids.push(f.id+":"+i)); }); return ids; } if(node.kind==="feat"){ const ids=[node.id]; node.obj.specs.forEach((sp,i)=>ids.push(node.id+":"+i)); return ids; } return [node.id]; }
function traceFor(node){ const ids=new Set(childIds(node)); const pgMap={}; ids.forEach(id=>pagesRefTo(id).forEach(p=>pgMap[p.id]=p)); const trans=((SOT.flow&&SOT.flow.transitions)||[]).filter(t=>t.ref&&ids.has(t.ref)); const kpis=((SOT.prd&&SOT.prd.kpis)||[]).filter(k=>(k.refs||[]).some(r=>ids.has(r))); return {pages:Object.values(pgMap),trans,kpis}; }
function renderTrace(node,includeIA){
  const tc=traceFor(node); let rows="";
  if(includeIA){ const pg=tc.pages.map(p=>`<button class="trace-chip" data-goia="${p.id}">${esc(p.title)}</button>`).join("")||`<span class="empty-inline">${t('없음','None')}</span>`; rows+=`<div class="trace-row"><span class="trace-k">${t('화면(IA)','Screens (IA)')}</span><span class="trace-v">${pg}</span></div>`; }
  const fl=tc.trans.map(tr=>`<button class="trace-chip" data-goflow="${tr.from}">${esc(flowMeta(tr.from).title)} → ${esc(flowMeta(tr.to).title)}</button>`).join("")||`<span class="empty-inline">${t('없음','None')}</span>`;
  const kp=tc.kpis.map(k=>`<button class="trace-chip kpi" data-gokpi="1">${esc(k.name)}</button>`).join("")||`<span class="empty-inline">${t('없음','None')}</span>`;
  rows+=`<div class="trace-row"><span class="trace-k">${t('플로우','Flow')}</span><span class="trace-v">${fl}</span></div>`;
  rows+=`<div class="trace-row"><span class="trace-k">KPI</span><span class="trace-v">${kp}</span></div>`;
  return `<div class="dt-sec">${t('연결 (추적성)','Connections (traceability)')}</div>${rows}`;
}
function renderProgress(node){
  const ac=node.obj.acceptance||[]; const acDone=ac.filter(a=>a.done).length; let bar="";
  if(node.kind==="req"){ const fs=node.obj.features; const c={todo:0,doing:0,done:0}; fs.forEach(f=>{ c[f.status]=(c[f.status]||0)+1; }); const tot=fs.length||1; const seg=k=>c[k]?`<span class="pb ${k}" style="width:${(c[k]/tot*100).toFixed(1)}%"></span>`:''; bar=`<div class="prog-bar">${seg('done')}${seg('doing')}${seg('todo')}</div><div class="prog-legend">${t('완료','Done')} ${c.done} · ${t('진행','In progress')} ${c.doing} · ${t('할일','To do')} ${c.todo} <span class="pl-dim">(${t('기능','features')} ${fs.length})</span></div>`; }
  else if(node.kind==="feat"){ bar=`<div class="prog-legend">${t('상세기능','Sub-features')} ${node.obj.specs.length}${t('개','')}</div>`; }
  const acLine=ac.length?`<div class="prog-legend">${t('수용 기준','Acceptance')} ${acDone}/${ac.length} ${t('완료','done')}</div>`:'';
  if(!bar && !acLine) return "";
  return `<div class="dt-sec">${t('진행 요약','Progress summary')}</div>${bar}${acLine}`;
}
function renderDetail(){
  const n = nodeInfo(selNode);

        <input type="checkbox" data-ac-done="${n.ref}#${i}" ${a.done?'checked':''}>
        <span class="ac-text" contenteditable data-ac-text="${n.ref}#${i}">${esc(a.text)}</span>
        <button class="ac-del" data-ac-del="${n.ref}#${i}" title="${t('삭제','Delete')}">×</button></div>`).join("")
        || `<div class="empty">${t('수용 기준이 없습니다. ＋로 추가하세요.','No acceptance criteria. Add with ＋.')}</div>`;
    return `<div class="detail">
      <div class="dt-title field" contenteditable data-spec="${n.ref}">${esc(s.title)}</div>
      <div class="dt-goto"><button class="topbtn" data-gototree>${t('↗ 트리 뷰로 이동','↗ Go to tree view')}</button>
        <button class="topbtn" data-del-spec="${n.ref}" style="margin-left:6px">${t('상세기능 삭제','Delete sub-feature')}</button></div>
      <div class="dt-row"><span class="dt-k">ID</span><span class="dt-v">${n.ref}</span></div>
      <div class="dt-row"><span class="dt-k">${t('유형','Type')}</span><span class="dt-v">${t('상세 기능 (Specification)','Sub-feature (Specification)')}</span></div>
      <div class="dt-sec">${t('설명','Description')}</div>
      <div class="dt-desc field" contenteditable data-spec-desc="${n.ref}">${esc(s.desc||'')}</div>
      <div class="dt-sec">${t('수용 기준','Acceptance criteria')} <button class="addbtn sm" data-add-ac="${n.ref}">＋</button></div>
      <div class="ac-list">${sac}</div>
      ${renderProgress(n)}
      ${renderTrace(n,true)}
    </div>`;
  }
  const o=n.obj, id=n.id;
  const titleAttr = n.kind==="req"?`data-req-title="${id}"`:`data-feat-title="${id}"`;
  const descAttr  = n.kind==="req"?`data-req-desc="${id}"`:`data-feat-desc="${id}"`;
  const typeLabel = n.kind==="req"?t("요구사항 (Requirement)","Requirement"):t("기능 (Feature)","Feature");
  const statusOpt = Object.keys(STAT).map(k=>`<option value="${k}" ${o.status===k?'selected':''}>${t(STAT[k].t,STAT[k].e)}</option>`).join("");
  const prioOpt   = Object.keys(PRIO).map(k=>`<option value="${k}" ${o.priority===k?'selected':''}>${t(PRIO[k].t,PRIO[k].e)}</option>`).join("");
  const ac = (o.acceptance||[]).map((a,i)=>`<div class="ac-item ${a.done?'done':''}">
      <input type="checkbox" data-ac-done="${id}#${i}" ${a.done?'checked':''}>
      <span class="ac-text" contenteditable data-ac-text="${id}#${i}">${esc(a.text)}</span>
      <button class="ac-del" data-ac-del="${id}#${i}" title="${t('삭제','Delete')}">×</button></div>`).join("")
      || `<div class="empty">${t('수용 기준이 없습니다. ＋로 추가하세요.','No acceptance criteria. Add with ＋.')}</div>`;
  let screenBlock="";
  if(n.kind==="feat"){
    const linked=pagesRefTo(id);
    const rows=linked.map(pg=>`<div class="ia-link"><span class="ill">${esc(pageLabel(pg.id))}</span><button class="ac-del" data-map-unlink="${pg.id}~${id}" style="opacity:1">×</button></div>`).join("") || `<div class="empty">${t('연결된 화면이 없습니다.','No linked screens.')}</div>`;
    const opts=allPages().filter(pg=>!linked.some(x=>x.id===pg.id)).map(pg=>`<option value="${pg.id}">${esc(pg.label)}</option>`).join("");
    const secOpts=SOT.ia.sections.map(s=>`<option value="${s.id}">${esc(s.title)} ${t('하위','›')}</option>`).join("");
    screenBlock=`<div class="dt-sec">${t('연결된 화면 (IA)','Linked screens (IA)')}</div>
      <div class="ac-list">${rows}</div>
      <div class="ia-linkadd"><select data-map-existing="${id}"><option value="">${t('기존 화면에 연결…','Link to existing screen…')}</option>${opts}</select></div>

  }
  return `<div class="detail">
    <div class="dt-title field" contenteditable ${titleAttr}>${esc(o.title)}</div>
    <div class="dt-goto"><button class="topbtn" data-gototree>${t('↗ 트리 뷰로 이동','↗ Go to tree view')}</button></div>
    <div class="dt-row"><span class="dt-k">ID</span><span class="dt-v">${id}</span></div>
    <div class="dt-row"><span class="dt-k">${t('유형','Type')}</span><span class="dt-v">${typeLabel}</span></div>
    <div class="dt-row"><span class="dt-k">${t('상태','Status')}</span><select data-status="${id}">${statusOpt}</select></div>
    <div class="dt-row"><span class="dt-k">${t('중요도','Priority')}</span><select data-priority="${id}">${prioOpt}</select></div>
    <div class="dt-sec">${t('설명','Description')}</div>
    <div class="dt-desc field" contenteditable ${descAttr}>${esc(o.desc||'')}</div>

    <div class="ac-list">${ac}</div>

/* ==== 70-ia.js ==== */
/* ------------------------------ IA (정보구조) ------------------------------ */
function iaFillMissing(){
  SOT.requirements.forEach(r=>{
    r.features.forEach(f=>{
      let fpage=findPageByRef(f.id);
      if(!fpage){
        let sec=SOT.ia.sections.find(s=>s.title===r.title);
        if(!sec){ sec={id:nid("S"),title:r.title,pages:[]}; SOT.ia.sections.push(sec); }
        fpage={id:nid("P"),title:f.title,type: sec.pages.length?"page":"top",refs:[f.id],children:[]};
        sec.pages.push(fpage);
      }
      f.specs.forEach((sp,si)=>{ const sid=f.id+":"+si; if(!findPageByRef(sid)) fpage.children.push({id:nid("P"),title:specTitle(sp),type:"action",refs:[sid],children:[]}); });
    });
  });
}
function buildIAFromSpec(){
  SOT.ia.sections = SOT.requirements.map(r=>({
    id:nid("S"), title:r.title,
    pages: r.features.map((f,fi)=>({
      id:nid("P"), title:f.title, type: fi===0?"top":"page", refs:[f.id],
      children: f.specs.map((sp,si)=>({ id:nid("P"), title:specTitle(sp), type:"action", refs:[f.id+":"+si], children:[] }))
    }))
  }));
}
function iaPageLi(p){
  const kids = (p.children&&p.children.length)?`<ul>${p.children.map(iaPageLi).join("")}</ul>`:"";
  const cls = p.type==="top"?"top":(p.type==="action"?"action":"page");
  return `<li><div class="snode ${cls} ${p.id===selPage?'sel':''}" data-selpage="${p.id}">
      <span class="stype">${ptype(p.type)}</span>
      <span class="stitle">${esc(p.title)}</span>
      <span class="srowbtns"><button class="mini" data-add-page="${p.id}" title="${t('하위 추가','Add child')}">＋</button><button class="mini" data-del-page="${p.id}" title="${t('삭제','Delete')}">×</button></span>
    </div>${kids}</li>`;
}

/* --------------------- 유저플로우 (전환 그래프) --------------------- */
function computeFlow(){
  const f=SOT.flow||{}; const trans=(f.transitions||[]).filter(t=>t&&t.from&&t.to);
  const ids=new Set(); trans.forEach(t=>{ids.add(t.from);ids.add(t.to);}); if(f.start) ids.add(f.start);
  const nodes=[...ids]; if(!nodes.length) return null;
  const incoming={}; nodes.forEach(n=>incoming[n]=0); trans.forEach(t=>{ if(t.from!==t.to) incoming[t.to]++; });
  const start=(f.start&&ids.has(f.start))?f.start:(nodes.find(n=>incoming[n]===0)||nodes[0]);
  const adj={}; nodes.forEach(n=>adj[n]=[]); trans.forEach(t=>{ if(adj[t.from]) adj[t.from].push(t.to); });
  const layer={}; layer[start]=0; const q=[start];
  while(q.length){ const n=q.shift(); adj[n].forEach(m=>{ if(layer[m]===undefined){ layer[m]=layer[n]+1; q.push(m); } }); }
  let mx=0; nodes.forEach(n=>{ if(layer[n]!==undefined&&layer[n]>mx) mx=layer[n]; });
  nodes.forEach(n=>{ if(layer[n]===undefined) layer[n]=mx+1; });
  const byL={}; nodes.forEach(n=>{ (byL[layer[n]]=byL[layer[n]]||[]).push(n); });
  const order={};
  Object.keys(byL).map(Number).sort((a,b)=>a-b).forEach(L=>{
    if(L===0){ byL[L].forEach((n,i)=>order[n]=i); return; }
    byL[L].sort((a,b)=>{
      const pa=trans.filter(t=>t.to===a&&layer[t.from]!==undefined).map(t=>order[t.from]).filter(x=>x!==undefined);
      const pb=trans.filter(t=>t.to===b&&layer[t.from]!==undefined).map(t=>order[t.from]).filter(x=>x!==undefined);
      const ma=pa.length?pa.reduce((s,x)=>s+x,0)/pa.length:999;
      const mb=pb.length?pb.reduce((s,x)=>s+x,0)/pb.length:999;
      return ma-mb || a.localeCompare(b,undefined,{numeric:true});
    });
    byL[L].forEach((n,i)=>order[n]=i);
  });
  return {trans,nodes,layer,byL,start};
}
let flowZ=1, flowX=0, flowY=0, flowW=0, flowH=0, flowSel=null, flowLabels=false, flowEdit=false;
function applyFlowFocus(){
  const vp=document.getElementById("flowVP"); if(!vp) return;
  const groups=vp.querySelectorAll(".fedgeg"), nodes=vp.querySelectorAll("[data-fn]");
  if(flowSel && ![...nodes].some(n=>n.dataset.fn===flowSel)) flowSel=null;
  if(!flowSel){ groups.forEach(g=>g.classList.remove("hot","dim")); nodes.forEach(n=>n.classList.remove("dim","sel")); return; }
  const conn=new Set([flowSel]);
  groups.forEach(g=>{ const on=(g.dataset.from===flowSel||g.dataset.to===flowSel); g.classList.toggle("hot",on); g.classList.toggle("dim",!on); if(on){conn.add(g.dataset.from);conn.add(g.dataset.to);} });
  nodes.forEach(n=>{ const id=n.dataset.fn; n.classList.toggle("sel",id===flowSel); n.classList.toggle("dim",!conn.has(id)); });
}
function renderFlow(){
  const g=computeFlow();
  const legend=`<div class="flow-legend">
      <span class="lg"><span class="sw start"></span>${t('시작','Start')}</span>
      <span class="lg"><span class="sw top"></span>${t('섹션 최상위','Section top')}</span>
      <span class="lg"><span class="sw page"></span>${t('페이지','Page')}</span>
      <span class="lg"><span class="sw action"></span>${t('행동','Action')}</span>
      <span class="lg">${t('→ 화면 이동(전환)','→ Navigation (transition)')}</span>
    </div>`;
  const zoom=`<div class="flow-zoom"><button class="zbtn" data-zoom="out">−</button><button class="zbtn" data-zoom="fit">${t('맞춤','Fit')}</button><button class="zbtn" data-zoom="in">＋</button></div>`;
  if(!g) return `<div class="flowg" id="flowVP">${legend}<div class="empty" style="padding:48px">${t('전환(유저플로우) 데이터가 없습니다.','No user-flow transition data.')}</div></div>`;
  const COLW=390, ROWH=124, padX=46, padY=58, NW=206, NH=52;
  const pos={};
  Object.keys(g.byL).map(Number).sort((a,b)=>a-b).forEach(L=>{ g.byL[L].forEach((n,i)=>{ pos[n]={x:padX+L*COLW, y:padY+i*ROWH}; }); });
  const maxL=Math.max(...Object.keys(g.byL).map(Number));
  const maxRows=Math.max(...Object.values(g.byL).map(a=>a.length));
  flowW=padX+(maxL+1)*COLW+140; flowH=padY+maxRows*ROWH+120;
  let paths="";
  const nodeBoxes=Object.values(pos).map(p=>({x:p.x-4,y:p.y-4,w:NW+8,h:NH+8}));
  const labelBoxes=[];
  const boxOverlap=(a,b)=>a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;
  const placeLabel=(x,y)=>{
    const offsets=[0,-24,24,-48,48,-72,72,-96,96,-120,120,-144,144];
    for(const offset of offsets){
      const box={x,y:Math.max(4,y+offset),w:156,h:22};
      if(!nodeBoxes.some(node=>boxOverlap(box,node))&&!labelBoxes.some(label=>boxOverlap(box,label))){ labelBoxes.push(box); return box; }
    }
    const box={x,y:Math.max(4,y+offsets[offsets.length-1]),w:156,h:22}; labelBoxes.push(box); return box;
  };
  const outRank=[], inRank=[], outCount={}, inCount={};
  g.trans.forEach(t=>{ outCount[t.from]=(outCount[t.from]||0)+1; inCount[t.to]=(inCount[t.to]||0)+1; });
  const nextOut={}, nextIn={};
  g.trans.forEach((t,index)=>{ outRank[index]=nextOut[t.from]||0; nextOut[t.from]=(nextOut[t.from]||0)+1; inRank[index]=nextIn[t.to]||0; nextIn[t.to]=(nextIn[t.to]||0)+1; });
  g.trans.forEach((t,ei)=>{
    const a=pos[t.from], b=pos[t.to]; if(!a||!b) return;
    const so=(outRank[ei]-(outCount[t.from]-1)/2)*7;
    const ti=(inRank[ei]-(inCount[t.to]-1)/2)*7;
    let d, lx, ly;
    if(b.x>a.x){
      const x1=a.x+NW, y1=a.y+NH/2+so, x2=b.x, y2=b.y+NH/2+ti;
      const gap=x2-x1, lane=((ei%5)-2)*18;
      const mx=x1+Math.max(90,gap*.46);
      d=`M${x1},${y1} C${mx},${y1+lane} ${x2-Math.max(90,gap*.32)},${y2-lane} ${x2},${y2}`;
      lx=x1+Math.min(150,Math.max(92,gap*.34));
      ly=y1+lane-10;
    } else {
      const sx=a.x+NW/2+so, sy=a.y+NH, tx=b.x+NW/2+ti, ty=b.y+NH;
      const dip=Math.max(sy,ty)+ROWH*(.82+(ei%4)*.18);
      d=`M${sx},${sy} C${sx},${dip} ${tx},${dip} ${tx},${ty}`;
      lx=(sx+tx)/2; ly=dip-16;
    }
    paths+=`<g class="fedgeg" data-from="${t.from}" data-to="${t.to}"><path class="fedge-hit" d="${d}"/><path class="fedge" d="${d}" marker-end="url(#fa)"/>`;
    const lab=transLabel(t);
    if(lab){ const box=placeLabel(lx-78,ly); paths+=`<foreignObject x="${box.x}" y="${box.y}" width="156" height="22"><div class="elabel ${t.ref?'reff':''}" xmlns="http://www.w3.org/1999/xhtml" title="${esc(lab)}">${esc(lab)}</div></foreignObject>`; }
    paths+=`</g>`;
  });
  if(labelBoxes.length) flowH=Math.max(flowH,Math.max(...labelBoxes.map(box=>box.y+box.h))+40);
  let nds="";
  g.nodes.forEach(n=>{ const m=flowMeta(n); const cls=m.type==="top"?"top":(m.type==="action"?"action":"page");
    nds+=`<div class="fnode ${cls} ${n===g.start?'is-start':''}" style="left:${pos[n].x}px;top:${pos[n].y}px;width:${NW}px;height:${NH}px" data-fn="${n}" title="${esc(m.title)}"><span class="ftitle">${esc(m.title)}</span></div>`;
  });
  const cov=flowCoverage();
  return `<div class="flowwrap">
    ${cov.banner}
    <div class="flow-stage">
      <div class="flow-main">
        <div class="flowg ${flowLabels?'labels':''}" id="flowVP">
          <div class="flowg-inner" id="flowInner" style="width:${flowW}px;height:${flowH}px">
            <svg width="${flowW}" height="${flowH}" style="position:absolute;left:0;top:0;overflow:visible">
              <defs><marker id="fa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#b3a8e0"/></marker></defs>
              ${paths}
            </svg>
            ${nds}
          </div>
        </div>
        <div class="flow-tools">
          <button class="ztg ${flowLabels?'on':''}" data-ftool="labels">${t('라벨','Labels')}</button>
          <button class="ztg ${flowEdit?'on':''}" data-ftool="edit">${t('편집','Edit')}</button>
          <button class="ztg" data-ftool="clear">${t('선택 해제','Clear')}</button>
          <span class="ft-hint">${flowEdit?t('오른쪽 패널에서 전환 추가·삭제 · 트리거=기능이면 라벨 자동','Add/remove transitions in the right panel · feature trigger = auto label'):t('노드 클릭 = 연결된 흐름만 강조','Click a node to highlight its flow')}</span>
        </div>
        ${legend}
        ${zoom}
      </div>
      ${flowEdit?renderFlowEditPanel():''}
    </div>
  </div>`;
}
function applyFlowTransform(){ const el=document.getElementById("flowInner"); if(el) el.style.transform="scale("+flowZ+")"; }
function flowFit(){ const vp=document.getElementById("flowVP"); if(!vp||!flowW) return; const z=Math.min((vp.clientWidth||900)/flowW,(vp.clientHeight||600)/flowH,1); flowZ=Math.max(0.2,z||1); applyFlowTransform(); vp.scrollTo(0,0); }
function layoutFlow(){
  const vp=document.getElementById("flowVP"); if(!vp) return;
  if(!flowZ) flowZ=1; applyFlowTransform();
  vp.classList.toggle("labels", flowLabels); applyFlowFocus();
  let dg=false,sx,sy,sl,st;
  vp.onpointerdown=(e)=>{ if(e.target.closest("[data-fn]")||e.target.closest(".flow-tools")||e.target.closest(".flow-zoom")) return; dg=true; sx=e.clientX; sy=e.clientY; sl=vp.scrollLeft; st=vp.scrollTop; vp.style.cursor="grabbing"; };
  vp.onpointermove=(e)=>{ if(!dg) return; vp.scrollLeft=sl-(e.clientX-sx); vp.scrollTop=st-(e.clientY-sy); };
  vp.onpointerup=vp.onpointercancel=()=>{ dg=false; vp.style.cursor="grab"; };
}


/* ==== 85-flow-edit.js ==== */
function flowCoverage(){
  const pages=allPages(); const known=new Set(pages.map(p=>p.id));
  const trans=(SOT.flow&&SOT.flow.transitions)||[];
  const used=new Set(); trans.forEach(t=>{used.add(t.from);used.add(t.to);}); if(SOT.flow&&SOT.flow.start) used.add(SOT.flow.start);
  const orphans=pages.filter(p=>!used.has(p.id));
  const dangling=trans.filter(t=>!known.has(t.from)||!known.has(t.to));
  let banner;
  if(orphans.length||dangling.length){
    const chips=orphans.slice(0,12).map(o=>`<span class="warn-chip">${esc(o.label.split("›").pop().trim())}</span>`).join("");
    banner=`<div class="flow-warn">⚠ ${t('흐름에 연결 안 된 화면','Screens not connected in the flow')} <b>${orphans.length}</b>${t('개','')}${dangling.length?` · ${t('없는 화면 참조','dangling refs')} <b>${dangling.length}</b>${t('개','')}`:''}<span class="iw-btns">${orphans.length?`<button class="addbtn sm" data-fcov="orphans">${t('시작에 연결','Connect to start')}</button>`:''}${dangling.length?`<button class="addbtn sm ghost" data-fcov="clean">${t('참조 정리','Clean refs')}</button>`:''}</span> ${chips}</div>`;
  } else banner=`<div class="flow-warn ok">✓ ${t('모든 화면이 흐름에 연결되어 있습니다.','All screens are connected in the flow.')}</div>`;
  return {orphans,dangling,banner};
}
function triggerSelect(tr,i){
  const cat=specCatalog();
  const isCustom=(!tr.ref&&tr.label);
  const opts=cat.map(c=>`<option value="${c.id}" ${tr.ref===c.id?'selected':''}>${esc(c.label)}</option>`).join("");
  return `<select data-tref="${i}"><option value="" ${(!tr.ref&&!tr.label)?'selected':''}>${t('— 자동/없음 —','— Auto/None —')}</option>${opts}<option value="__custom" ${isCustom?'selected':''}>${t('직접 입력…','Custom…')}</option></select>${isCustom?`<input data-tlabel="${i}" value="${esc(tr.label)}" placeholder="${t('라벨 직접 입력','Enter label')}" style="margin-top:5px">`:''}`;
}
function renderFlowEditPanel(){
  const pages=allPages();
  const opts=pages.map(p=>`<option value="${p.id}">${esc(p.label)}</option>`).join("");
  const startOpts=pages.map(p=>`<option value="${p.id}" ${(SOT.flow&&SOT.flow.start)===p.id?'selected':''}>${esc(p.label)}</option>`).join("");
  const cat=specCatalog();
  const trans=(SOT.flow&&SOT.flow.transitions)||[];
  const rows=trans.map((tr,i)=>`<div class="tr-row"><div class="tr-head"><span class="tr-fromto">${esc(flowMeta(tr.from).title)} → ${esc(flowMeta(tr.to).title)}</span><button class="mini" data-tdel="${i}" title="${t('삭제','Delete')}">×</button></div>${triggerSelect(tr,i)}</div>`).join("") || `<div class="fep-empty">${t('전환이 없습니다.','No transitions.')}</div>`;
  return `<div class="flow-editpanel"><div class="fep-sec">${t('시작 화면','Start screen')}</div><select data-flowstart>${startOpts}</select><div class="fep-sec">${t('전환 추가','Add transition')}</div><div class="fep-add"><select data-addfrom><option value="">${t('출발 화면…','From screen…')}</option>${opts}</select><select data-addto><option value="">${t('도착 화면…','To screen…')}</option>${opts}</select><select data-addref><option value="">${t('트리거 기능 (선택)','Trigger feature (optional)')}</option>${cat.map(c=>`<option value="${c.id}">${esc(c.label)}</option>`).join("")}<option value="__custom">${t('직접 입력…','Custom…')}</option></select><input data-addlabel placeholder="${t('직접 입력 라벨(트리거 미선택 시)','Custom label (if no trigger)')}"><button class="addbtn" data-addtrans>${t('＋ 전환 추가','＋ Add transition')}</button></div><div class="fep-sec">${t('전환 목록','Transitions')} (${trans.length}) · ${t('트리거=기능이면 라벨 자동','feature trigger = auto label')}</div><div class="fep-list">${rows}</div></div>`;
}

/* ============================ EVENT WIRING ============================ */
document.querySelectorAll(".tab").forEach(t=>t.addEventListener("click",()=>{VIEW=t.dataset.view;render();}));
document.getElementById("resetBtn").addEventListener("click",()=>{ if(!HISTORY.length) return; restoreTo(0); const pt=document.getElementById("prodTitle"); if(pt&&pt.firstChild) pt.firstChild.textContent=SOT.title||"제품"; });

/* delegated edits (contenteditable) */
document.getElementById("stage").addEventListener("input",e=>{
  const t=e.target; if(!t.dataset) return; const v=t.textContent;
  if("prod" in t.dataset) SOT.title=v;
  else if(t.dataset.prdField) SOT.prd[t.dataset.prdField]=v;
  else if(t.dataset.prdList){ const[k,i]=t.dataset.prdList.split("#"); SOT.prd[k][+i]=v; }
  else if(t.dataset.reqDesc) find(t.dataset.reqDesc).desc=v;
  else if(t.dataset.reqTitle) find(t.dataset.reqTitle).title=v;
  else if(t.dataset.featTitle) findF(t.dataset.featTitle).f.title=v;
  else if(t.dataset.featDesc) findF(t.dataset.featDesc).f.desc=v;
  else if(t.dataset.acText){ const[id,i]=t.dataset.acText.split("#"); ownerOf(id).acceptance[+i].text=v; }
  else if(t.dataset.iaTitle){ const r=iaFindPage(t.dataset.iaTitle); if(r) r.page.title=v; }
  else if(t.dataset.secTitle){ const s=SOT.ia.sections.find(x=>x.id===t.dataset.secTitle); if(s) s.title=v; }
  else if(t.dataset.spec){ const[fid,si]=t.dataset.spec.split(":"); findF(fid).f.specs[+si].title=v; }
  else if(t.dataset.specDesc){ const[fid,si]=t.dataset.specDesc.split(":"); findF(fid).f.specs[+si].desc=v; }
  else if(t.dataset.persona){ const[i,f]=t.dataset.persona.split("#"); SOT.prd.targets[+i][f]=v; }
  else if(t.dataset.scnText!==undefined){ SOT.prd.scenarios[+t.dataset.scnText].text=v; }
  else if(t.dataset.kpi){ const[i,f]=t.dataset.kpi.split("#"); SOT.prd.kpis[+i][f]=v; }
  if(VIEW==="tree") layoutTree();
  else if(VIEW==="flow") layoutFlow();
});
/* clicks: selection (rows) + add/delete (buttons) */
document.getElementById("stage").addEventListener("click",e=>{
  const b=e.target.closest("button");
  if(!b){ // row selection / column expand in the directory view
    const ex=e.target.closest("[data-expand]");
    if(ex){ if(ex.dataset.expand==="req") colReqCol=false; else colFeatCol=false; render(); return; }
    const sr=e.target.closest("[data-selreq]");
    if(sr){ selReq=sr.dataset.selreq; const r=find(selReq); selFeat=r.features[0]?r.features[0].id:null; selNode=selReq; render(); return; }
    const sf=e.target.closest("[data-selfeat]");
    if(sf){ selFeat=sf.dataset.selfeat; selNode=selFeat; render(); return; }
    const sn=e.target.closest("[data-selnode]");
    if(sn){ selNode=sn.dataset.selnode; render(); return; }
    const ss=e.target.closest("[data-selsec]");
    if(ss){ selSec=ss.dataset.selsec; selPage=null; render(); return; }
    const sp=e.target.closest("[data-selpage]");
    if(sp){ selPage=sp.dataset.selpage; render(); return; }
    const tn=e.target.closest("[data-node]");
    if(tn){ goToSpec(tn.dataset.node); return; }
    if(VIEW==="flow"){ if(!flowEdit){ const nd=e.target.closest("[data-fn]"); flowSel=(nd&&nd.dataset.fn===flowSel)?null:(nd?nd.dataset.fn:null); applyFlowFocus(); } return; }
    return;
  }
  const d=b.dataset;
  if(d.prdAdd){ (SOT.prd[d.prdAdd]=SOT.prd[d.prdAdd]||[]).push("새 항목"); commit(); }
  else if(d.prdDel){ const[k,i]=d.prdDel.split("#"); SOT.prd[k].splice(+i,1); commit(); }
  else if("personaAdd" in d){ SOT.prd.targets.push({name:"새 페르소나",role:"",needs:"",pain:""}); commit(); }
  else if(d.personaDel!==undefined){ SOT.prd.targets.splice(+d.personaDel,1); commit(); }
  else if("scnAdd" in d){ SOT.prd.scenarios.push({text:"새 시나리오",start:""}); commit(); }
  else if(d.scnDel!==undefined){ SOT.prd.scenarios.splice(+d.scnDel,1); commit(); }
  else if(d.scnGo){ VIEW="flow"; flowSel=d.scnGo; render(); }
  else if("kpiAdd" in d){ SOT.prd.kpis.push({name:"새 KPI",target:"",baseline:"",method:"",refs:[]}); commit(); }
  else if(d.kpiDel!==undefined){ SOT.prd.kpis.splice(+d.kpiDel,1); commit(); }
  else if(d.kpiRefdel!==undefined){ const[i,j]=d.kpiRefdel.split("#"); SOT.prd.kpis[+i].refs.splice(+j,1); commit(); }
  else if("addReq" in d){ SOT.requirements.push({id:nid("R"),title:"새 요구사항",desc:"설명을 입력하세요.",status:"todo",priority:"mid",acceptance:[],features:[]}); commit(); }
  else if(d.collapse){ if(d.collapse==="req") colReqCol=true; else colFeatCol=true; render(); }
  else if(d.addFeat){ const f={id:nid("F"),title:"새 기능",priority:"mid",status:"todo",desc:"",acceptance:[],specs:[{title:"새 상세기능",desc:"",acceptance:[]}]}; find(d.addFeat).features.push(f); selFeat=f.id; selNode=f.id; commit(); }
  else if(d.delFeat){ const r=findF(d.delFeat).r; r.features=r.features.filter(f=>f.id!==d.delFeat); commit(); }
  else if(d.addSpec){ const ff=findF(d.addSpec).f; ff.specs.push({title:"새 상세기능",desc:"",acceptance:[]}); selNode=d.addSpec+":"+(ff.specs.length-1); commit(); }
  else if(d.delSpec){ const[fid,si]=d.delSpec.split(":"); findF(fid).f.specs.splice(+si,1); if(selNode===d.delSpec) selNode=fid; commit(); }
  else if(d.addchild){ addChild(d.addchild); }
  else if(d.delnode){ delNode(d.delnode); }
  else if(d.star){ toggleStar(d.star); }
  else if("gototree" in d){ VIEW="tree"; render(); }
  else if("gotoflow" in d){ VIEW="flow"; render(); }
  else if(d.goia){ const r=iaFindPage(d.goia); if(r){ selSec=r.sec.id; selPage=d.goia; } VIEW="ia"; render(); }
  else if(d.goflow){ VIEW="flow"; flowSel=d.goflow; render(); }
  else if("gokpi" in d){ VIEW="prd"; render(); }
  else if(d.zoom){ if(d.zoom==="in") flowZ=Math.min(2.2,flowZ*1.15); else if(d.zoom==="out") flowZ=Math.max(0.2,flowZ/1.15); else { flowFit(); return; } applyFlowTransform(); }
  else if(d.ftool){ if(d.ftool==="labels"){ flowLabels=!flowLabels; document.getElementById("flowVP").classList.toggle("labels",flowLabels); b.classList.toggle("on",flowLabels); } else if(d.ftool==="edit"){ flowEdit=!flowEdit; render(); } else if(d.ftool==="clear"){ flowSel=null; applyFlowFocus(); } }
  else if("addtrans" in d){ const stg=document.getElementById("stage"); const from=stg.querySelector("[data-addfrom]").value, to=stg.querySelector("[data-addto]").value, refv=stg.querySelector("[data-addref]").value, custom=stg.querySelector("[data-addlabel]").value; if(from&&to){ SOT.flow.transitions=SOT.flow.transitions||[]; if(!SOT.flow.transitions.some(t=>t.from===from&&t.to===to)){ SOT.flow.transitions.push(flowTransition(from,to,refv&&refv!=="__custom"?refv:"",custom)); } commit(); } }
  else if(d.tdel!==undefined){ SOT.flow.transitions.splice(+d.tdel,1); commit(); }
  else if(d.fcov){ if(d.fcov==="orphans"){ const cov=flowCoverage(); const stt=(SOT.flow&&SOT.flow.start)||(SOT.ia.sections[0]&&SOT.ia.sections[0].pages[0]&&SOT.ia.sections[0].pages[0].id); SOT.flow.transitions=SOT.flow.transitions||[]; cov.orphans.forEach(o=>{ if(o.id!==stt) SOT.flow.transitions.push(flowTransition(stt,o.id)); }); } else if(d.fcov==="clean"){ const known=new Set(allPages().map(p=>p.id)); SOT.flow.transitions=(SOT.flow.transitions||[]).filter(t=>known.has(t.from)&&known.has(t.to)); } commit(); }
  else if(d.addAc){ ownerOf(d.addAc).acceptance.push({text:"새 수용 기준",done:false}); commit(); }
  else if(d.acDel){ const[id,i]=d.acDel.split("#"); ownerOf(id).acceptance.splice(+i,1); commit(); }
  else if("addSec" in d){ const s={id:nid("S"),title:"새 섹션",pages:[]}; SOT.ia.sections.push(s); selSec=s.id; selPage=null; commit(); }
  else if(d.delSec){ SOT.ia.sections=SOT.ia.sections.filter(s=>s.id!==d.delSec); if(selSec===d.delSec){selSec=null;selPage=null;} commit(); }
  else if(d.addToppage){ const s=SOT.ia.sections.find(x=>x.id===d.addToppage); const p={id:nid("P"),title:"새 페이지",type:"top",refs:[],children:[]}; s.pages.push(p); selPage=p.id; commit(); }
  else if(d.addPage){ const r=iaFindPage(d.addPage); const p={id:nid("P"),title:"새 페이지",type:"page",refs:[],children:[]}; r.page.children.push(p); selPage=p.id; commit(); }
  else if(d.delPage){ const r=iaFindPage(d.delPage); if(r){ const i=r.arr.indexOf(r.page); r.arr.splice(i,1); if(selPage===d.delPage) selPage=null; } commit(); }
  else if(d.iaUnlink){ const[pid,i]=d.iaUnlink.split("#"); const r=iaFindPage(pid); if(r) r.page.refs.splice(+i,1); commit(); }
  else if(d.mapUnlink){ const[pid,fid]=d.mapUnlink.split("~"); const r=iaFindPage(pid); if(r) r.page.refs=r.page.refs.filter(x=>x!==fid); commit(); }
  else if("iaFillmissing" in d){ iaFillMissing(); commit(); }
  else if("iaRebuild" in d){ if(window.confirm(t("기능명세서 기준으로 IA를 다시 생성합니다. 지금 IA 구조는 대체됩니다. 계속할까요?","This rebuilds the IA from the Feature Spec and replaces the current IA. Continue?"))){ buildIAFromSpec(); selSec=SOT.ia.sections[0]?SOT.ia.sections[0].id:null; selPage=null; commit(); } }
});
/* change: status / priority selects + acceptance checkboxes */
document.getElementById("stage").addEventListener("change",e=>{
  const d=e.target.dataset;
  if(d.status){ ownerOf(d.status).status=e.target.value; commit(); }
  else if(d.priority){ ownerOf(d.priority).priority=e.target.value; commit(); }
  else if(d.acDone){ const[id,i]=d.acDone.split("#"); ownerOf(id).acceptance[+i].done=e.target.checked; commit(); }
  else if(d.iaType){ const r=iaFindPage(d.iaType); if(r) r.page.type=e.target.value; commit(); }
  else if(d.iaLink){ if(e.target.value){ const r=iaFindPage(d.iaLink); if(r) r.page.refs.push(e.target.value); commit(); } }
  else if(d.mapExisting){ if(e.target.value){ const r=iaFindPage(e.target.value); if(r) r.page.refs.push(d.mapExisting); commit(); } }
  else if(d.mapNewin){ if(e.target.value){ const fid=d.mapNewin; let sec; if(e.target.value==="__new"){ sec={id:nid("S"),title:"새 섹션",pages:[]}; SOT.ia.sections.push(sec); } else sec=SOT.ia.sections.find(s=>s.id===e.target.value); if(sec){ const c=specCatalog().find(x=>x.id===fid); const title=c?c.label.split("›").pop().trim():"새 화면"; sec.pages.push({id:nid("P"),title,type:"page",refs:[fid],children:[]}); commit(); } } }
  else if(d.scnStart!==undefined){ SOT.prd.scenarios[+d.scnStart].start=e.target.value; commit(); }
  else if(d.kpiRefadd!==undefined){ if(e.target.value){ SOT.prd.kpis[+d.kpiRefadd].refs.push(e.target.value); commit(); } }
  else if(d.flowstart!==undefined){ SOT.flow.start=e.target.value; commit(); }
  else if(d.tref!==undefined){ const t=SOT.flow.transitions[+d.tref]; const v=e.target.value; if(v==="__custom"){ t.ref=""; if(!t.label) t.label="새 라벨"; } else if(v){ t.ref=v; t.label=""; } else { t.ref=""; t.label=""; } commit(); }
  else if(d.tlabel!==undefined){ SOT.flow.transitions[+d.tlabel].label=e.target.value; commit(); }
});
/* history + save/load wiring */
function resetSelections(){ selReq=SOT.requirements[0]?SOT.requirements[0].id:null; selFeat=SOT.requirements[0]&&SOT.requirements[0].features[0]?SOT.requirements[0].features[0].id:null; selNode=selReq; selSec=SOT.ia.sections[0]?SOT.ia.sections[0].id:null; selPage=null; }
document.getElementById("stage").addEventListener("focusout",e=>{ if(e.target&&e.target.isContentEditable) snapshotIfChanged(t("텍스트 편집","Text edit")); });
document.getElementById("prodTitle").addEventListener("focusout",()=>snapshotIfChanged(t("제목 편집","Title edit")));
document.getElementById("undoBtn").addEventListener("click",undo);
document.getElementById("redoBtn").addEventListener("click",redo);
document.getElementById("histBtn").addEventListener("click",()=>{document.getElementById("histDrawer").classList.toggle("open");renderHistory();});
document.getElementById("histClose").addEventListener("click",()=>document.getElementById("histDrawer").classList.remove("open"));
document.getElementById("histList").addEventListener("click",e=>{const it=e.target.closest("[data-hist]"); if(it) restoreTo(+it.dataset.hist);});
document.getElementById("saveBtn").addEventListener("click",()=>{

  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
});
document.getElementById("loadBtn").addEventListener("click",()=>document.getElementById("fileInput").click());
document.getElementById("fileInput").addEventListener("change",e=>{
  const f=e.target.files[0]; if(!f) return; const rd=new FileReader();
  rd.onload=()=>{ try{ SOT=normalize(JSON.parse(rd.result)); resetSelections(); pushHistory(t("불러오기","Load")); render(); }catch(err){ alert(t("불러오기 실패: 올바른 JSON 파일이 아닙니다.","Load failed: not a valid JSON file.")); } e.target.value=""; };
  rd.readAsText(f);
});
document.addEventListener("keydown",e=>{ const t=e.target; if(t&&(t.isContentEditable||t.tagName==="INPUT"||t.tagName==="SELECT")) return; if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="z"){ e.preventDefault(); e.shiftKey?redo():undo(); } });

resetSelections();
selPage=SOT.ia.sections[0]&&SOT.ia.sections[0].pages[0]?SOT.ia.sections[0].pages[0].id:null;
pushHistory(t("현재 상태","Current state"));
updateUndoButtons();
try{ LANG = localStorage.getItem(LANG_KEY) || (SOT&&SOT.lang) || "ko"; }catch(e){}
document.getElementById("langBtn").addEventListener("click",()=>{ LANG = LANG==="en"?"ko":"en"; try{ localStorage.setItem(LANG_KEY,LANG); }catch(e){} applyStaticI18n(); render(); });
applyStaticI18n();
render();
